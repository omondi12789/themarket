services:
  - type: web
    name: themarket-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "cd apps/backend && pip install -r requirements.txt"
    startCommand: "cd apps/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        value: postgresql://postgres:postgres@localhost:5432/themarket
      - key: DATABASE_READ_REPLICA_URL
        value: ""
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: JWT_SECRET
        value: dev-secret-change-me
      - key: JWT_REFRESH_SECRET
        value: dev-refresh-secret-change-me
      - key: FERNET_KEY
        value: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      - key: AI_ENGINE_URL
        value: http://localhost:8100
      - key: ENV
        value: production

  - type: web
    name: themarket-ai-engine
    env: python
    region: oregon
    plan: free
    buildCommand: "cd apps/ai-engine && pip install -r requirements.txt"
    startCommand: "cd apps/ai-engine && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENV
        value: production

  - type: web
    name: themarket-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: "cd apps/frontend && npm install && npm run build"
    startCommand: "cd apps/frontend && npm start"
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://themarket-backend.onrender.com
