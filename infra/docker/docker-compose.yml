version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://forex:${POSTGRES_PASSWORD:-changeme}@postgres:5432/forex
  TIMESCALE_URL: postgresql://forex:${POSTGRES_PASSWORD:-changeme}@timescaledb:5432/forex_ticks
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
  ENV: ${ENV:-development}

services:
  postgres:
    image: postgres:16-alpine
    container_name: forex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: forex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex"]
      interval: 5s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: forex_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: forex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: forex_ticks
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescale-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: forex_backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend:/app

  celery-worker:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: forex_celery_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app

  celery-beat:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: forex_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app

  ai-engine:
    build:
      context: ../../apps/ai-engine
      dockerfile: Dockerfile
    container_name: forex_ai_engine
    restart: unless-stopped
    environment:
      <<: *backend-env
      HF_HOME: /models/.cache
    depends_on:
      - redis
    volumes:
      - ../../apps/ai-engine:/app
      - hf_model_cache:/models/.cache
    ports:
      - "8100:8100"

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: forex_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  timescale_data:
  hf_model_cache:
